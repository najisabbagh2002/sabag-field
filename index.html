<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c; --accent: #e8a020; --accent2: #2ecc8a;
    --bg: #f0f4f8; --card: #fff; --border: #d0dce8;
    --text: #1a2a3a; --muted: #7a8fa8; --danger: #e84040;
    --shadow: 0 4px 24px rgba(26,58,92,0.10); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header { background: var(--primary); color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(26,58,92,0.25); }
  .app-header h1 { font-size: 0.97rem; font-weight: 700; flex: 1; text-align: center; }
  .date-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color:#fff; font-size:0.78rem; padding:4px 10px; border-radius:20px; white-space:nowrap; }

  .main-wrap { max-width: 680px; margin: 0 auto; padding: 14px 12px 40px; }

  .section-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; border: 1px solid var(--border); }
  .section-title { background: var(--primary); color: #fff; padding: 10px 16px; font-size: 0.87rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-body { padding: 14px 14px 10px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 11px; }
  .field-row.single { grid-template-columns: 1fr; }
  @media(max-width:480px){ .field-row { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.73rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  label .req { color: var(--accent); margin-right: 2px; }

  input[type="text"], input[type="date"], select, textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 9px; font-family: 'Heebo', sans-serif; font-size: 0.93rem;
    color: var(--text); background: #fff; outline: none; direction: rtl;
    transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,58,92,0.10); }
  textarea { resize: vertical; min-height: 72px; }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { display:none; position:absolute; top:calc(100% + 3px); right:0; left:0; background:#fff; border:1.5px solid var(--primary); border-radius:10px; max-height:220px; overflow-y:auto; z-index:300; box-shadow:0 8px 24px rgba(26,58,92,0.18); }
  .autocomplete-list.open { display:block; }
  .autocomplete-item { padding:10px 13px; font-size:0.91rem; cursor:pointer; border-bottom:1px solid #f0f4f8; transition:background 0.12s; direction:rtl; }
  .autocomplete-item:last-child { border-bottom:none; }
  .autocomplete-item:hover, .autocomplete-item.hl { background:#eef4fb; color:var(--primary); font-weight:600; }
  .autocomplete-item mark { background:#fff3c0; border-radius:2px; padding:0 1px; font-weight:700; font-style:normal; }
  .autocomplete-empty { padding:11px 13px; color:var(--muted); font-size:0.86rem; text-align:center; }

  /* Time picker wheel */
  .time-display-btn {
    width:100%; padding:11px 12px; border:1.5px solid var(--border); border-radius:9px;
    font-family:'Heebo',sans-serif; font-size:1.05rem; font-weight:700; color:var(--primary);
    background:#fff; cursor:pointer; text-align:center; letter-spacing:0.05em;
    transition:border-color 0.2s, box-shadow 0.2s; direction:ltr;
  }
  .time-display-btn:hover { border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,58,92,0.08); }
  .time-display-btn.empty { color:var(--muted); font-size:0.9rem; font-weight:500; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .time-picker-sheet {
    background:#fff; border-radius:22px 22px 0 0; padding:0 0 30px;
    width:100%; max-width:400px; box-shadow:0 -8px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .sheet-handle { width:40px; height:4px; background:#ddd; border-radius:4px; margin:12px auto 0; }
  .sheet-title { text-align:center; font-size:0.95rem; font-weight:700; color:var(--primary); padding:12px 0 6px; }
  
  .wheels-wrap { display:flex; align-items:center; justify-content:center; gap:0; padding:8px 20px; direction:ltr; position:relative; }
  .wheels-wrap::before {
    content:''; position:absolute; top:50%; left:20px; right:20px;
    height:44px; transform:translateY(-50%);
    background:rgba(26,58,92,0.06); border-radius:10px; pointer-events:none;
  }
  .wheel-col { display:flex; flex-direction:column; align-items:center; }
  .wheel-sep { font-size:1.6rem; font-weight:800; color:var(--primary); padding:0 8px; line-height:1; align-self:center; }
  .drum {
    height:220px; overflow-y:scroll; scroll-snap-type:y mandatory;
    width:80px; scrollbar-width:none; -ms-overflow-style:none;
    padding:88px 0;
  }
  .drum::-webkit-scrollbar { display:none; }
  .drum-item {
    height:44px; display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; font-weight:600; color:#aabbcc;
    scroll-snap-align:center; cursor:pointer; border-radius:8px;
    transition:color 0.15s, font-size 0.15s, font-weight 0.15s;
    user-select:none;
  }
  .drum-item.active { color:var(--primary); font-size:1.65rem; font-weight:800; }
  .sheet-btns { display:flex; gap:10px; padding:14px 20px 0; }
  .btn-cancel { flex:1; padding:12px; border:1.5px solid var(--border); border-radius:10px; background:#fff; color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.92rem; font-weight:600; cursor:pointer; }
  .btn-confirm { flex:1; padding:12px; border:none; border-radius:10px; background:var(--primary); color:#fff; font-family:'Heebo',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; }

  .total-badge { background:#eafaf3; border:1.5px solid var(--accent2); border-radius:9px; padding:9px 14px; text-align:center; font-weight:700; color:#1a7a50; font-size:0.95rem; margin-top:4px; display:none; }

  /* Team grid */
  .team-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(128px,1fr)); gap:8px; }
  .team-btn { padding:9px 8px; border:2px solid var(--border); border-radius:9px; background:#fff; font-family:'Heebo',sans-serif; font-size:0.84rem; font-weight:500; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:6px; justify-content:center; transition:all 0.18s; }
  .team-btn:hover { border-color:var(--primary); background:#f0f5fb; }
  .team-btn.selected { border-color:var(--accent2); background:#eafaf3; color:#1a7a50; font-weight:700; }
  .check-circle { width:17px; height:17px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:transparent; flex-shrink:0; transition:all 0.18s; }
  .team-btn.selected .check-circle { background:var(--accent2); border-color:var(--accent2); color:#fff; }

  /* Status */
  .status-row { display:flex; gap:10px; }
  .status-opt { flex:1; padding:12px 8px; border:2px solid var(--border); border-radius:10px; text-align:center; cursor:pointer; font-size:0.9rem; font-weight:600; transition:all 0.18s; color:var(--muted); background:#fff; }
  .status-opt.sel-done { border-color:var(--accent2); background:#eafaf3; color:#1a7a50; }
  .status-opt.sel-partial { border-color:var(--accent); background:#fff9ee; color:#b37800; }

  /* Error */
  .err-msg { font-size:0.74rem; color:var(--danger); margin-top:3px; display:none; }
  .err-msg.show { display:block; }

  /* Buttons */
  .submit-area { display:flex; gap:10px; padding:4px 0 0; }
  .btn-save { flex:1; background:var(--primary); color:#fff; border:none; border-radius:10px; padding:15px; font-family:'Heebo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(26,58,92,0.22); transition:all 0.2s; }
  .btn-save:hover { background:#1e4a78; transform:translateY(-1px); }
  .btn-clear { padding:15px 16px; background:#fff; color:var(--muted); border:1.5px solid var(--border); border-radius:10px; font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.18s; }
  .btn-clear:hover { border-color:var(--danger); color:var(--danger); }

  /* Saved */
  .saved-preview { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); margin-top:18px; overflow:hidden; display:none; }
  .saved-preview.visible { display:block; }
  .saved-header { background:#f8fafb; border-bottom:1px solid var(--border); padding:11px 15px; font-size:0.84rem; font-weight:700; color:var(--primary); display:flex; align-items:center; justify-content:space-between; }
  .saved-count { background:var(--accent); color:#fff; border-radius:20px; font-size:0.74rem; font-weight:700; padding:2px 10px; }
  .saved-item { padding:11px 15px; border-bottom:1px solid #f0f4f8; display:flex; align-items:flex-start; gap:10px; animation:fadeIn 0.25s ease; }
  .saved-item:last-child { border-bottom:none; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .s-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .dot-done { background:var(--accent2); } .dot-partial { background:var(--accent); }
  .s-num { background:var(--primary); color:#fff; border-radius:7px; font-size:0.76rem; font-weight:700; padding:3px 8px; white-space:nowrap; flex-shrink:0; }
  .s-info strong { font-size:0.87rem; } .s-info span { color:var(--muted); font-size:0.77rem; display:block; margin-top:2px; }

  /* Toast */
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a3a5c; color:#fff; padding:12px 24px; border-radius:50px; font-size:0.92rem; font-weight:600; box-shadow:0 8px 30px rgba(26,58,92,0.30); transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--accent2); }
  .toast.err { background:var(--danger); }
</style>

<!-- Time Picker Modal -->
<div class="modal-overlay" id="timeModal" onclick="handleOverlayClick(event)">
  <div class="time-picker-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">שעת התחלה</div>
    <div class="wheels-wrap">
      <div class="wheel-col">
        <div class="drum" id="drumH"></div>
      </div>
      <div class="wheel-sep">:</div>
      <div class="wheel-col">
        <div class="drum" id="drumM"></div>
      </div>
    </div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closePicker()">ביטול</button>
      <button class="btn-confirm" onclick="confirmPicker()">אישור ✓</button>
    </div>
  </div>
</div>

<div class="main-wrap">

  <!-- פרטי עבודה -->
  <div class="section-card">
    <div class="section-title">📋 פרטי עבודה</div>
    <div class="section-body">

      <div class="field-row">
        <div class="field">
          <label><span class="req">*</span>תאריך</label>
          <input type="date" id="txtDate">
        </div>
        <div class="field">
          <label><span class="req">*</span>מספר עבודה</label>
          <input type="text" id="txtWorkNo" placeholder="לדוגמה: 14123R">
        </div>
      </div>

      <div class="field-row single">
        <div class="field">
          <label><span class="req">*</span>יישוב</label>
          <div class="autocomplete-wrap" id="cityWrap">
            <input type="text" id="cmbCity" placeholder="הקלד שם יישוב..." autocomplete="off" oninput="filterCities()" onfocus="filterCities()">
            <div class="autocomplete-list" id="cityList"></div>
          </div>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>מזמין</label>
          <input type="text" id="txtClient" placeholder="שם המזמין">
        </div>
        <div class="field">
          <label>הוכן עבור</label>
          <input type="text" id="txtPreparedFor" placeholder="הוכן עבור...">
        </div>
      </div>

      <div class="field-row single">
        <div class="field">
          <label><span class="req">*</span>סוג עבודה</label>
          <select id="cmbType" onchange="checkOther()">
            <option value="">— בחר סוג —</option>
            <option>מדידה מצבית</option>
            <option>מדידת מצב קיים לתכנון</option>
            <option>מדידה להיוון</option>
            <option>מדידה לצורך תב"ע</option>
            <option>עדכון מדידה</option>
            <option>מדידה לממד</option>
            <option>סקר עצים</option>
            <option>אזמייד - AS MADE</option>
            <option>סימונים</option>
            <option>תצ"ר / תת"ג</option>
            <option>סריקה</option>
            <option>רחפן</option>
            <option value="אחר">אחר</option>
          </select>
        </div>
      </div>
      <div class="field-row single" id="otherTypeRow" style="display:none;">
        <div class="field">
          <label><span class="req">*</span>פרט את סוג העבודה</label>
          <textarea id="txtOtherType" placeholder="תאר את סוג העבודה..." maxlength="200"></textarea>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>שעת התחלה</label>
          <button type="button" class="time-display-btn empty" id="btnStart" onclick="openPicker('start')">— בחר שעה —</button>
        </div>
        <div class="field">
          <label>שעת סיום</label>
          <button type="button" class="time-display-btn empty" id="btnEnd" onclick="openPicker('end')">— בחר שעה —</button>
        </div>
      </div>
      <div class="total-badge" id="totalBadge">⏱ סה"כ: <span id="totalText"></span></div>

    </div>
  </div>

          <select id="cmbDevice2">

// ===== TEAM =====
function buildTeamGrid() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  workers.forEach(w => {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'team-btn'; btn.dataset.name = w;
    btn.innerHTML = `<span class="check-circle">✓</span>${w}`;
    btn.onclick = () => { btn.classList.toggle('selected'); document.getElementById('teamErr').classList.remove('show'); };
    grid.appendChild(btn);
  });
}

// ===== TIME PICKER =====
const HOURS = Array.from({length:24},(_,i)=>i);
const MINS  = [0,15,30,45];

function buildDrum(drumEl, items, selectedVal) {
  drumEl.innerHTML = '';
  items.forEach(v => {
    const el = document.createElement('div');
    el.className = 'drum-item' + (v === selectedVal ? ' active' : '');
    el.textContent = String(v).padStart(2,'0');
    el.dataset.val = v;
    drumEl.appendChild(el);
  });

  // Scroll listener
  drumEl.addEventListener('scroll', () => {
    const itemH = 44;
    const idx = Math.round(drumEl.scrollTop / itemH);
    drumEl.querySelectorAll('.drum-item').forEach((el,i) => el.classList.toggle('active', i===idx));
    if (drumEl.id === 'drumH') activePicker==='start' ? (startH=items[idx]||0) : (endH=items[idx]||0);
    else activePicker==='start' ? (startM=MINS[idx]||0) : (endM=MINS[idx]||0);
  });

  // Scroll to selected
  const selIdx = items.indexOf(selectedVal);
  if (selIdx >= 0) setTimeout(() => drumEl.scrollTop = selIdx * 44, 30);
}

function openPicker(which) {
  activePicker = which;
  document.getElementById('sheetTitle').textContent = which === 'start' ? 'שעת התחלה' : 'שעת סיום';
  const h = which === 'start' ? startH : endH;
  const m = which === 'start' ? startM : endM;
  buildDrum(document.getElementById('drumH'), HOURS, h);
  buildDrum(document.getElementById('drumM'), MINS, m);
  document.getElementById('timeModal').classList.add('open');
}

function closePicker() { document.getElementById('timeModal').classList.remove('open'); }

function handleOverlayClick(e) { if (e.target === document.getElementById('timeModal')) closePicker(); }

function confirmPicker() {
  const h = activePicker === 'start' ? startH : endH;
  const m = activePicker === 'start' ? startM : endM;
  const str = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  const btn = document.getElementById(activePicker === 'start' ? 'btnStart' : 'btnEnd');
  btn.textContent = str;
  btn.classList.remove('empty');
  closePicker();
  calcTotal();
}

function calcTotal() {
  const bs = document.getElementById('btnStart'), be = document.getElementById('btnEnd');
  if (bs.classList.contains('empty') || be.classList.contains('empty')) { document.getElementById('totalBadge').style.display='none'; return; }
  const [sh,sm] = bs.textContent.split(':').map(Number);
  const [eh,em] = be.textContent.split(':').map(Number);
  const mins = (eh*60+em)-(sh*60+sm);
  if (mins<=0) { document.getElementById('totalBadge').style.display='none'; return; }
  const hh=Math.floor(mins/60), mm=mins%60;
  document.getElementById('totalText').textContent = hh>0?(mm>0?hh+' שעות '+mm+' דקות':hh+' שעות'):mm+' דקות';
  document.getElementById('totalBadge').style.display='block';
}

function syncDevice2() {
  const v1 = document.getElementById('cmbGps').value;
  const s2 = document.getElementById('cmbDevice2');
  Array.from(s2.options).forEach(o => {
    o.disabled = !!(o.value && o.value === v1);
    o.style.color = o.disabled ? '#ccc' : '';
  });
  if (s2.value === v1) s2.value = '';
}

  document.getElementById('otherTypeRow').style.display = v==='אחר'?'block':'none';

}

}

// ===== CITY AUTOCOMPLETE =====
function filterCities() {
  const input = document.getElementById('cmbCity');
  const list  = document.getElementById('cityList');
  const q = input.value.trim();
  if (!q) { list.classList.remove('open'); list.innerHTML=''; return; }
  const matches = cities
    .filter(c => c.includes(q))
    .sort((a,b) => { const as=a.startsWith(q)?0:1,bs=b.startsWith(q)?0:1; return as-bs||a.localeCompare(b,'he'); })
    .slice(0,35);
  if (!matches.length) { list.innerHTML='<div class="autocomplete-empty">לא נמצאו תוצאות</div>'; list.classList.add('open'); return; }
  const rx = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
  list.innerHTML = matches.map(c =>
    `<div class="autocomplete-item" onmousedown="pickCity('${c.replace(/'/g,"\'")}')">` +
    c.replace(rx,'<mark>$1</mark>') + '</div>'
  ).join('');
  list.classList.add('open');
}
function pickCity(v){ document.getElementById('cmbCity').value=v; document.getElementById('cityList').classList.remove('open'); }
document.addEventListener('click', e=>{ if(!document.getElementById('cityWrap').contains(e.target)) document.getElementById('cityList').classList.remove('open'); });

// ===== SAVE =====
function saveWork() {
  let ok = true;
  if (!document.getElementById('txtDate').value)          { showToast('⚠️ חסר תאריך','err'); ok=false; }
  if (!document.getElementById('txtWorkNo').value.trim()) { showToast('⚠️ חסר מספר עבודה','err'); ok=false; }
  if (!document.getElementById('cmbCity').value.trim())   { showToast('⚠️ חסר יישוב','err'); ok=false; }
  if (!document.getElementById('cmbType').value)          { showToast('⚠️ חסר סוג עבודה','err'); ok=false; }
  if (document.getElementById('cmbType').value==='אחר' && !document.getElementById('txtOtherType').value.trim()) { showToast('⚠️ נא לפרט סוג עבודה','err'); ok=false; }
  const teamBtns = document.querySelectorAll('.team-btn.selected');
  if (!teamBtns.length) { document.getElementById('teamErr').classList.add('show'); showToast('⚠️ חייב לבחור עובד','err'); ok=false; }
  if (!selectedStatus)  { document.getElementById('statusErr').classList.add('show'); showToast('⚠️ חסר סטטוס','err'); ok=false; }
  if (!ok) return;

  const typeVal = document.getElementById('cmbType').value==='אחר'
    ? 'אחר: '+document.getElementById('txtOtherType').value.trim()
    : document.getElementById('cmbType').value;

  const bs = document.getElementById('btnStart');
  const be = document.getElementById('btnEnd');

  const work = {
    date:        document.getElementById('txtDate').value,
    workNo:      document.getElementById('txtWorkNo').value.trim(),
    city:        document.getElementById('cmbCity').value.trim(),
    client:      document.getElementById('txtClient').value.trim(),
    preparedFor: document.getElementById('txtPreparedFor').value.trim(),
    type:        typeVal,
    startTime:   bs.classList.contains('empty') ? '' : bs.textContent,
    endTime:     be.classList.contains('empty') ? '' : be.textContent,
    duration:    document.getElementById('totalText').textContent || '',
    gps:         document.getElementById('cmbGps').value,
    gpsFile:     document.getElementById('txtFile1').value.trim(),
    device2:     document.getElementById('cmbDevice2').value,
    device2File: document.getElementById('txtFile2').value.trim(),
    tablet:      document.getElementById('cmbTablet').value,
    team:        [...teamBtns].map(b=>b.dataset.name).join(', '),
    status:      selectedStatus,
    notes:       document.getElementById('txtNotes').value.trim()
  };

  savedWorks.push(work);
  renderSaved();

  // שמירה ל-Google Sheets
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzRnwCxVPV9s5Li-CMIWMkTq9bTK8FYwvdUwuEoIJ-wqYkDSwSEO_nMQqqLOtv5HnT-4g/exec';
  const params = new URLSearchParams();
  Object.keys(work).forEach(k => params.append(k, work[k] || ''));
  showToast('⏳ שומר...', '');
  fetch(SHEET_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' })
    .then(() => showToast('✅ נשמר בהצלחה!', 'success'))
    .catch(() => showToast('⚠️ בעיית חיבור', 'err'));
  setTimeout(clearFormFields, 400);
}

function clearFormFields() {
  document.getElementById('txtDate').value = new Date().toISOString().split('T')[0];
  ['txtWorkNo','txtClient','txtPreparedFor','txtNotes','txtOtherType'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cmbCity').value='';
  document.getElementById('cmbType').value='';
  document.getElementById('otherTypeRow').style.display='none';
  document.getElementById('cmbGps').value='';
  document.getElementById('txtFile1').value='';
  document.getElementById('cmbDevice2').value='';
  document.getElementById('txtFile2').value='';
  document.getElementById('cmbTablet').value='';
  document.getElementById('btnStart').textContent='— בחר שעה —'; document.getElementById('btnStart').classList.add('empty');
  document.getElementById('btnEnd').textContent='— בחר שעה —'; document.getElementById('btnEnd').classList.add('empty');
  document.getElementById('totalBadge').style.display='none';
  startH=8;startM=0;endH=10;endM=0;
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.status-opt').forEach(o=>o.classList.remove('sel-done','sel-partial'));
  selectedStatus='';
}
function clearForm(){ clearFormFields(); showToast('🗑️ הטופס נוקה',''); }

function renderSaved() {
  const preview=document.getElementById('savedPreview'), list=document.getElementById('savedList');
  preview.classList.add('visible');
  document.getElementById('savedCount').textContent=savedWorks.length;
  list.innerHTML='';
  [...savedWorks].reverse().forEach(w=>{
    const dot=w.status==='הושלם'?'dot-done':'dot-partial';
    const d=document.createElement('div'); d.className='saved-item';
    d.innerHTML=`<div class="s-dot ${dot}"></div><div class="s-num">${w.workNo}</div><div class="s-info"><strong>${w.city} — ${w.type}</strong><span>👷 ${w.team}</span><span>⏰ ${w.startTime||'—'} עד ${w.endTime||'—'}${w.duration?' ('+w.duration+')':''}</span>${w.tablet?`<span>📱 ${w.tablet}</span>`:''}</div>`;
    list.appendChild(d);
  });
}

let toastT;
function showToast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||''); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2800); }
</script>
